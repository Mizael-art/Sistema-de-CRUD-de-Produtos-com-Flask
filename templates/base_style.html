<!-- ============================================================
     ARQUIVO DE ESTILOS BASE — incluído em todas as páginas
     Você não precisa mexer aqui, é só visual
     ============================================================ -->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* Barra de navegação no topo */
  nav {
    background: #1a1a2e;
    padding: 14px 30px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  nav span {
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    margin-right: auto;
  }
  nav a {
    color: #a0b4d0;
    text-decoration: none;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 6px;
    transition: background .2s;
  }
  nav a:hover, nav a.ativo {
    background: rgba(255,255,255,.12);
    color: #fff;
  }

  /* Container central */
  .container {
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 24px;
    color: #1a1a2e;
  }

  /* Card branco */
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }

  /* Inputs e labels */
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #dde1e9;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border .2s;
  }
  input:focus { border-color: #4a6cf7; }

  /* Botões */
  .btn {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary   { background: #4a6cf7; color: #fff; }
  .btn-danger    { background: #e74c3c; color: #fff; }
  .btn-secondary { background: #eef0f7; color: #333; }
  .btn:hover { opacity: .88; }

  /* Tabela de produtos */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #888;
    padding: 0 14px 12px;
    border-bottom: 2px solid #f0f0f0;
  }
  td {
    padding: 14px;
    font-size: 15px;
    border-bottom: 1px solid #f5f5f5;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbff; }

  /* Mensagem de feedback */
  .mensagem {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 600;
  }
  .mensagem.sucesso { background: #eaffea; color: #1e7e34; border: 1px solid #b8f0b8; }
  .mensagem.erro    { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
</style>
